# ============================================================================
# dbt_project.yml — Arquivo central de configuração do projeto dbt
# ============================================================================
# Este arquivo define:
#   - Nome e versão do projeto
#   - Qual profile de conexão usar (profiles.yml)
#   - Onde encontrar models, tests, macros, seeds, etc.
#   - Configurações padrão para os models (materialização, estratégia, etc.)
#
# Equivale ao package.json / pyproject.toml no mundo dbt.
# ============================================================================

name: 'my_sample_project'   # Nome do projeto (apenas lowercase + underscores)
version: '1.0.0'            # Versão do projeto (semantic versioning)

# ============================================================================
# Variáveis globais acessíveis nos models via {{ var("nome_da_var") }}
# Usadas principalmente em modelos incrementais para filtrar por data.
# ============================================================================
vars:
  execution_date: '2022-09-01'  # Data fixa usada no filtro incremental (demo)

# ============================================================================
# Profile de conexão — deve corresponder ao nome definido no profiles.yml
# ============================================================================
profile: 'my_sample_project'

# ============================================================================
# Paths — onde o dbt procura cada tipo de arquivo
# ============================================================================
model-paths: ["models"]       # SQL files que viram tabelas/views
analysis-paths: ["analyses"]  # Queries ad-hoc (não são compiladas como models)
test-paths: ["tests"]         # Testes genéricos (SQL que retorna linhas = falha)
seed-paths: ["seeds"]         # CSVs que viram tabelas no banco (dbt seed)
macro-paths: ["macros"]       # Funções SQL reutilizáveis (Jinja macros)
snapshot-paths: ["snapshots"] # Histórico de mudanças (SCD Type 2)

# Pastas removidas ao rodar `dbt clean`
clean-targets:
  - "target"          # Output da compilação (SQL gerado, docs, etc.)
  - "dbt_packages"    # Pacotes instalados via dbt deps

# ============================================================================
# Configurações de models por diretório
# O prefixo + indica configuração aplicada aos models filhos.
# Podem ser sobrescritas individualmente com {{ config(...) }} no SQL.
# ============================================================================
models:
  my_sample_project:
    staging:
      # Estratégia padrão para models incrementais na pasta staging/
      # merge = UPSERT (insere novos, atualiza existentes pelo unique_key)
      +incremental_strategy: merge
