# ============================================================================
# DBT + Airflow + PostgreSQL — Employee Data Pipeline
# ============================================================================
#
# Pipeline ELT completo:
#   1. EXTRAÇÃO  → Python gera dados fake e carrega em raw_employees (Bronze)
#   2. TRANSFORMAÇÃO → dbt limpa, padroniza e modela (Silver → Gold)
#   3. VALIDAÇÃO → dbt test verifica qualidade dos dados
#
# Uso:
#   docker compose up -d
#   Acesse http://localhost:8080 (admin / admin)
#   Dispare a DAG "employee_data_pipeline"
#   Consulte as tabelas: docker compose exec dw psql -U dw_user -d dw -c "\dt"
#
# ============================================================================

services:
  # ==========================================================================
  # DATA WAREHOUSE — PostgreSQL
  # ==========================================================================
  dw:
    image: postgres:18
    ports:
      - 5000:5432
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dw_user -d dw"]
      interval: 5s
      timeout: 5s
      retries: 5
    environment:
      POSTGRES_DB: dw
      POSTGRES_USER: dw_user
      POSTGRES_PASSWORD: dw_password
    volumes:
      - db_data:/var/lib/postgresql

  # ==========================================================================
  # AIRFLOW INIT — Cria tabelas de metadata e usuário admin
  # Roda uma vez e encerra
  # ==========================================================================
  airflow-init:
    build: ./airflow
    container_name: airflow-init
    depends_on:
      dw:
        condition: service_healthy
    environment:
      AIRFLOW_UID: ${AIRFLOW_UID:-50000}
      AIRFLOW_GID: 0
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://dw_user:dw_password@dw:5432/dw
      AIRFLOW__CORE__FERNET_KEY: YlCImzYvHJHb11VZk2dB7F6zJvPjN0kMqRfGdHsTcUw=
      AIRFLOW__CORE__LOAD_DEFAULT_CONNECTIONS: "false"
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      DBT_PROFILES_DIR: /opt/airflow
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
      - ./dbt/my_sample_project:/opt/airflow/dbt_project
      - ./airflow/profiles.yml:/opt/airflow/profiles.yml
    command: >
      bash -c "
        airflow db migrate &&
        airflow users create --username admin --password admin --firstname Admin --lastname Admin --role Admin --email admin@admin.com
      "

  # ==========================================================================
  # AIRFLOW WEBSERVER — UI em http://localhost:8080
  # ==========================================================================
  airflow-webserver:
    build: ./airflow
    container_name: airflow-webserver
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    ports:
      - 8080:8080
    environment:
      AIRFLOW_UID: ${AIRFLOW_UID:-50000}
      AIRFLOW_GID: 0
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://dw_user:dw_password@dw:5432/dw
      AIRFLOW__CORE__FERNET_KEY: YlCImzYvHJHb11VZk2dB7F6zJvPjN0kMqRfGdHsTcUw=
      AIRFLOW__CORE__LOAD_DEFAULT_CONNECTIONS: "false"
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      DBT_PROFILES_DIR: /opt/airflow
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
      - ./dbt/my_sample_project:/opt/airflow/dbt_project
      - ./airflow/profiles.yml:/opt/airflow/profiles.yml
    command: webserver

  # ==========================================================================
  # AIRFLOW SCHEDULER — Dispara as DAGs
  # ==========================================================================
  airflow-scheduler:
    build: ./airflow
    container_name: airflow-scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    environment:
      AIRFLOW_UID: ${AIRFLOW_UID:-50000}
      AIRFLOW_GID: 0
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://dw_user:dw_password@dw:5432/dw
      AIRFLOW__CORE__FERNET_KEY: YlCImzYvHJHb11VZk2dB7F6zJvPjN0kMqRfGdHsTcUw=
      AIRFLOW__CORE__LOAD_DEFAULT_CONNECTIONS: "false"
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      DBT_PROFILES_DIR: /opt/airflow
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
      - ./dbt/my_sample_project:/opt/airflow/dbt_project
      - ./airflow/profiles.yml:/opt/airflow/profiles.yml
    command: scheduler

volumes:
  db_data:
