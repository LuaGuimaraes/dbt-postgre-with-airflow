services:
  # ============================================================================
  # DATA WAREHOUSE — PostgreSQL
  # Armazena os dados transformados pelo dbt e serve como metadata DB do Airflow
  # ============================================================================
  dw:
    image: postgres:18

    ports:
      - 5000:5432

    environment:
      POSTGRES_DB: dw
      POSTGRES_USER: dw_user
      POSTGRES_PASSWORD: dw_password

    volumes:
      - dbtvolume:/var/lib/postgresql

  # ============================================================================
  # AIRFLOW INIT — Inicialização do banco de metadata
  # Roda uma vez para criar as tabelas internas do Airflow no PostgreSQL
  # e criar o usuário admin. Depois de executar, o container encerra.
  # ============================================================================
  airflow-init:
    image: apache/airflow:2.10.5
    container_name: airflow-init

    depends_on:
      dw:
        condition: service_started

    environment:
      AIRFLOW_UID: ${AIRFLOW_UID:-50000}
      AIRFLOW_GID: 0
      # Executor Local — roda tarefas no mesmo container (ideal para dev/study)
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      # Conexão com o PostgreSQL existente (reutilizado como metadata DB)
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://dw_user:dw_password@dw:5432/dw
      # Chave de criptografia para conexões e variáveis sensíveis
      AIRFLOW__CORE__FERNET_KEY: YlCImzYvHJHb11VZk2dB7F6zJvPjN0kMqRfGdHsTcUw=
      # Não carrega conexões padrão desnecessárias
      AIRFLOW__CORE__LOAD_DEFAULT_CONNECTIONS: "false"
      # Desabilita exemplos de DAGs para manter a UI limpa
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"

    volumes:
      # Pasta onde ficam as DAGs (código dos pipelines)
      - ./airflow/dags:/opt/airflow/dags
      # Pasta de logs de execução
      - ./airflow/logs:/opt/airflow/logs
      # Pasta para plugins customizados
      - ./airflow/plugins:/opt/airflow/plugins

    # Comando que inicializa o banco e cria o usuário admin
    command: >
      bash -c "
        airflow db migrate &&
        airflow users create --username admin --password admin --firstname Admin --lastname Admin --role Admin --email admin@admin.com
      "

  # ============================================================================
  # AIRFLOW WEBSERVER — Interface web
  # Dashboard onde você visualiza, monitora e dispara as DAGs manualmente.
  # Acessível em http://localhost:8080 (login: admin / senha: admin)
  # ============================================================================
  airflow-webserver:
    image: apache/airflow:2.10.5
    container_name: airflow-webserver

    depends_on:
      - airflow-init

    ports:
      - 8080:8080irflow

    environment:
      AIRFLOW_UID: ${AIRFLOW_UID:-50000}
      AIRFLOW_GID: 0
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://dw_user:dw_password@dw:5432/dw
      AIRFLOW__CORE__FERNET_KEY: YlCImzYvHJHb11VZk2dB7F6zJvPjN0kMqRfGdHsTcUw=
      AIRFLOW__CORE__LOAD_DEFAULT_CONNECTIONS: "false"
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"

    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
      - ./airflow/plugins:/opt/airflow/plugins

    command: webserver

  # ============================================================================
  # AIRFLOW SCHEDULER — Agendador de tarefas
  # Monitora as DAGs, verifica schedules e dispara execuções quando chega a hora.
  # É o "cérebro" que decide quando cada pipeline deve rodar.
  # ============================================================================
  airflow-scheduler:
    image: apache/airflow:2.10.5
    container_name: airflow-scheduler

    depends_on:
      - airflow-init

    environment:
      AIRFLOW_UID: ${AIRFLOW_UID:-50000}
      AIRFLOW_GID: 0
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://dw_user:dw_password@dw:5432/dw
      AIRFLOW__CORE__FERNET_KEY: YlCImzYvHJHb11VZk2dB7F6zJvPjN0kMqRfGdHsTcUw=
      AIRFLOW__CORE__LOAD_DEFAULT_CONNECTIONS: "false"
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"

    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
      - ./airflow/plugins:/opt/airflow/plugins

    command: scheduler

volumes:
  dbtvolume:
